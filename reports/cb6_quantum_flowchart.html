<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CB6 Quantum Flowchart</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --ink: #172033;
      --muted: #5a667a;
      --line: #7c8798;
      --panel: #ffffff;
      --data: #d8eef7;
      --scan: #e6dcff;
      --brain: #dff3e8;
      --risk: #fff2c8;
      --exec: #ffd9d9;
      --monitor: #dbe7ff;
      --learn: #e7e9ee;
    }

    html,
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .page {
      width: min(1800px, 100vw);
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
    }

    .title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin: 0 0 14px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(7, auto);
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .key {
      width: 14px;
      height: 14px;
      border: 1px solid #aeb7c6;
      border-radius: 3px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: -2px;
    }

    .canvas {
      overflow: auto;
      background: #ffffff;
      border: 1px solid #d7dce5;
      border-radius: 8px;
      box-shadow: 0 12px 28px rgba(30, 42, 62, 0.10);
    }

    svg {
      display: block;
      width: 1750px;
      height: 1040px;
    }

    .lane {
      fill: #f9fbfe;
      stroke: #dce2ec;
      stroke-width: 1;
    }

    .lane-title {
      font-weight: 700;
      fill: #3b4659;
      font-size: 15px;
      letter-spacing: 0;
    }

    .box {
      stroke: #b8c0ce;
      stroke-width: 1.3;
      rx: 7;
      ry: 7;
    }

    .data { fill: var(--data); }
    .scan { fill: var(--scan); }
    .brain { fill: var(--brain); }
    .risk { fill: var(--risk); }
    .exec { fill: var(--exec); }
    .monitor { fill: var(--monitor); }
    .learn { fill: var(--learn); }
    .hub { fill: #eef1f6; }

    .box-title {
      fill: var(--ink);
      font-size: 17px;
      font-weight: 700;
      text-anchor: middle;
    }

    .box-sub {
      fill: #3d4a5d;
      font-size: 13px;
      text-anchor: middle;
    }

    .small {
      font-size: 12px;
    }

    .arrow {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }

    .arrow-strong {
      stroke: #37465c;
      stroke-width: 2.7;
      fill: none;
      marker-end: url(#arrowStrong);
    }

    .feedback {
      stroke: #8792a4;
      stroke-width: 2;
      stroke-dasharray: 8 7;
      fill: none;
      marker-end: url(#arrow);
    }

    .note {
      fill: #ffffff;
      stroke: #d3d8e2;
      stroke-width: 1;
      rx: 6;
      ry: 6;
    }

    .note-text {
      font-size: 12px;
      fill: var(--muted);
    }

    @media print {
      .page {
        width: 100%;
        padding: 0;
      }
      .canvas {
        border: 0;
        box-shadow: none;
        overflow: visible;
      }
      svg {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="title">
      <div>
        <h1>CB6 Quantum - Clean System Flow</h1>
        <p class="subtitle">Readable end-to-end architecture: data intake, signal engine, risk gates, execution, monitoring, and learning loop.</p>
      </div>
      <div class="legend" aria-label="Legend">
        <span><i class="key" style="background: var(--data)"></i>Data</span>
        <span><i class="key" style="background: var(--scan)"></i>Scan</span>
        <span><i class="key" style="background: var(--brain)"></i>Brain/ML</span>
        <span><i class="key" style="background: var(--risk)"></i>Risk</span>
        <span><i class="key" style="background: var(--exec)"></i>Execution</span>
        <span><i class="key" style="background: var(--monitor)"></i>Monitor</span>
        <span><i class="key" style="background: var(--learn)"></i>Learning</span>
      </div>
    </div>

    <section class="canvas" aria-label="CB6 Quantum flowchart">

        <!-- Swimlanes -->

        <text class="lane-title" x="148" y="80" text-anchor="middle">1. MARKET DATA</text>

        <rect class="lane" x="292" y="50" width="200" height="790" rx="8"></rect>
        <text class="lane-title" x="392" y="80" text-anchor="middle">2. SUPERVISOR</text>

        <rect class="lane" x="516" y="50" width="270" height="790" rx="8"></rect>
        <text class="lane-title" x="651" y="80" text-anchor="middle">3. SIGNAL ENGINE</text>

        <rect class="lane" x="1552" y="50" width="170" height="790" rx="8"></rect>
        <text class="lane-title" x="1637" y="80" text-anchor="middle">7. MONITOR</text>

        <!-- Data lane -->

        <rect class="box risk" x="1114" y="508" width="180" height="100"></rect>

        <rect class="box exec" x="1372" y="310" width="132" height="96"></rect>

  </main>
</body>
</html>
